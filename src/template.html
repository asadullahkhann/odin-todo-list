<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  </head>
  <body class="preload">
    <dialog>
      <form method="dialog">
        <p>
          <label for="todo">Todo</label>
          <input required id="todo" name="todo" minlength="4" placeholder="Swim in the ocean"/>
        </p>
        <p>
          <label for="desc">Description</label>
          <textarea required id="desc" name="desc" minlength="8" type="text" placeholder="Would be scary but fun"></textarea>
        </p>
        <p>
          <label for="priority">Priority </label>
          <select name="priority" id="priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </p>
        <p>
          <label for="due-date">Due Date</label>
          <input required id="due-date" name="dueDate" type="date" />
        </p>
        <p><button class="submit-btn">Submit</button></p>
      </form>
    </dialog>
    <header>
      <h1>Todo List</h1>
      <button class="toggle-sidebar-btn">
        <img src="./images/hamburger-menu.svg" alt="hamburder-menu-icon" />
        <img class="hide" src="./images/close-menu.svg" alt="close-menu">
      </button>
    </header>
    <div class="sidebar hide">
      <button class="add-todo-btn">Add task</button>
      <h2 class="projects-heading">Projects</h2>
      <div class="projects">
        <button># Today</button>
      </div>
      <div class="add-project">
      <input name="project-name" maxlength="25" type="text" placeholder="# Sunday"/>
      <button>Add project</button>
      </div>
    </div>
    <div class="todos-container"></div>
    <footer>© 2024 Muhammad Asad
      <a href="https://github.com/asadullahkhann">
        <img src="./images/github-mark-white.svg" alt="github-mark"/>
      </a>
    </footer>
  </body>
</html>
