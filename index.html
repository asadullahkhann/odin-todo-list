<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo List</title><script defer="defer" src="main.js"></script></head><body class="preload"><dialog><form method="dialog"><p><label for="todo">Todo</label> <input required id="todo" name="todo" minlength="4" placeholder="Swim in the ocean"/></p><p><label for="desc">Description</label> <textarea required id="desc" name="desc" minlength="8" type="text" placeholder="Would be scary but fun"></textarea></p><p><label for="priority">Priority</label> <select name="priority" id="priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></p><p><label for="due-date">Due Date</label> <input required id="due-date" name="dueDate" type="date"/></p><p><button class="submit-btn">Submit</button></p></form></dialog><header><h1>Todo List</h1><button class="toggle-sidebar-btn"><img src="856447928bc643fe4863.svg" alt="hamburder-menu-icon"/> <img class="hide" src="bb9bfa566dd014761ba8.svg" alt="close-menu"></button></header><div class="sidebar hide"><button class="add-todo-btn">Add task</button><h2 class="projects-heading">Projects</h2><div class="projects"><button># Today</button></div><div class="add-project"><input name="project-name" maxlength="25" placeholder="# Sunday"/> <button>Add project</button></div></div><div class="todos-container"></div><footer><p>Coded by <a href="https://github.com/asadullahkhann">AsadUllahKhaNn <img src="97ed8e7eef60d61ca469.svg" alt="github-mark"/></a></p></footer></body></html>
